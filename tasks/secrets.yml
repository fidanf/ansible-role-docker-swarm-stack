---
- name: Create/rotate managed secrets (rolling versions)
  community.docker.docker_secret:
    name: "{{ item.alias }}"
    data: "{{ item.data }}"
    rolling_versions: true
    versions_to_keep: "{{ item.versions_to_keep | default(2) }}"
    state: present
  register: swarm_stack_secrets_result
  tags: "{{ item.tags | default(['secrets']) }}"
  no_log: "{{ item.no_log | default(false) }}"
  when: item.data is defined and (item.data | string | length) > 0
  loop: "{{ swarm_stack_managed_secrets }}"
  loop_control:
    label: "{{ item.alias }}"

- name: Initialize secrets override map for compose
  ansible.builtin.set_fact:
    swarm_stack_secrets_override: {}

- name: Build secrets override map (alias -> current version name)
  ansible.builtin.set_fact:
    swarm_stack_secrets_override: >-
      {{
        swarm_stack_secrets_override
        | combine(
            {
              item.item.alias: {
                'external': true,
                'name': item.secret_name
              }
            }
          )
      }}
  loop: "{{ swarm_stack_secrets_result.results | default([]) }}"
  loop_control:
    label: "{{ item.item.alias | default('unknown') }}"
  when:
    - item is defined
    - item.skipped is not defined or not item.skipped
    - item.secret_name is defined
